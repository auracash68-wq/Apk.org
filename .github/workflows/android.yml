name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জাভা ২১ সেটআপ
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # ২. গ্রেডল অটো সেটআপ
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ৩. সিক্রেটস প্লাগইনের এরর কাটানোর জন্য ফাইল তৈরি
    - name: Create Dummy Env and Keystore Files
      run: |
        touch .env
        mkdir -p app
        # গিটহাব রানার যাতে কি-স্টোর ফাইল মিসিং এরর না দেয় তার জন্য একটি ফেইক কি-স্টোর তৈরি
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    # ৪. কি-স্টোর ও ম্যানিফেস্টের পাথ এরর বাইপাস করে সরাসরি বিল্ড রান করা
    - name: Build Debug APK
      run: gradle :app:assembleDebug -Pandroid.injected.signing.config.signingReady=true --no-daemon

    # ৫. তৈরি হওয়া APK ফাইলটি আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
        
