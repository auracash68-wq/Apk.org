name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জাভা ২১ সেটআপ
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # ২. গ্রেডল অটো সেটআপ
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ৩. সিক্রেটস ও কি-স্টোরের এরর বাইপাস করার জন্য ডামি ফাইল তৈরি
    - name: Create Dummy Env and Keystore Files
      run: |
        touch .env
        mkdir -p app
        keytool -genkey -v -keystore app/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    # ৪. সরাসরি 'app' ফোল্ডারের ভেতরে ঢুকে গ্রেডল টাস্ক রান করা (ফিক্স)
    - name: Build Debug APK
      run: gradle assembleDebug -Pandroid.injected.signing.config.signingReady=true --no-daemon
      working-directory: app

    # ৫. তৈরি হওয়া APK ফাইলটি গিটহাবে আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
        
