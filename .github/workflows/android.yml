name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. লেটেস্ট KSP ও কম্পোজ প্লাগইনের জন্য জাভা ২১ সেটআপ (এরর ফিক্স)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    # ২. গ্রেডল রানার ও ক্যাশ অটো সেটআপ
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ৩. সিক্রেটস প্লাগইনের জন্য খালি .env ফাইল তৈরি
    - name: Create Dummy Env File
      run: touch .env

    # ৪. সরাসরি গ্রেডল দিয়ে ডিবাগ APK বিল্ড করা
    - name: Build Debug APK
      run: gradle assembleDebug --no-daemon

    # ৫. তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
        
