name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জাভার একদম সঠিক এবং স্টেবল ভার্সন সেটআপ (KSP ক্র্যাশ ফিক্স)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin' # জুলু থেকে টেমুরিনে পরিবর্তন করা হয়েছে স্টেবিলিটির জন্য
        java-version: '17'

    # ২. গ্রেডল ক্যাশ ও টুলস অটো সেটআপ
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ৩. সিক্রেটস প্লাগইনের জন্য ডামি .env ফাইল তৈরি
    - name: Create Dummy Env File
      run: touch .env

    # ৪. সরাসরি গ্রেডল দিয়ে বিল্ড রান করা
    - name: Build Debug APK
      run: gradle assembleDebug

    # ৫. তৈরি হওয়া APK ফাইলটি ডাউনলোডের জন্য আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
        
