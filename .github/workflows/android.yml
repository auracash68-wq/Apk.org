name: Android APK Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # ১. জাভা এনভায়রনমেন্ট সেটআপ
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # ২. প্রজেক্টে gradlew ফাইল না থাকলে এটি নিজে থেকে গ্রেডল সেটআপ করে নেবে (ফিক্স)
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # ৩. সিক্রেটস প্লাগইনের জন্য ডামি .env ফাইল তৈরি করা
    - name: Create Dummy Env File
      run: touch .env

    # ৪. সরাসরি গ্রেডল কমান্ড দিয়ে ডিবাগ APK বিল্ড করা (gradlew ছাড়া)
    - name: Build Debug APK
      run: gradle assembleDebug

    # ৫. তৈরি হওয়া APK ফাইলটি গিটহাবে আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-android-app-apk
        path: "**/build/outputs/apk/debug/*.apk"
        
